version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./intel.db:/app/intel.db
      - ./.env:/app/.env:ro
    env_file:
      - .env
    restart: unless-stopped

  scheduler:
    build: .
    command: ["python", "scheduler.py"]
    volumes:
      - ./intel.db:/app/intel.db
      - ./.env:/app/.env:ro
    env_file:
      - .env
    restart: unless-stopped

  pipeline:
    build: .
    command: ["python", "main.py"]
    volumes:
      - ./intel.db:/app/intel.db
      - ./.env:/app/.env:ro
    env_file:
      - .env
    profiles:
      - oneshot
